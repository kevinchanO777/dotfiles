# ==============================================================================
# TMUX CONFIGURATION
# Checkout: https://marceloborges.dev/posts/4/
# List keys: `tmux list-keys | fzf`
# ==============================================================================

# ------------------------------------------------------------------------------
# GENERAL OPTIONS
# ------------------------------------------------------------------------------
set -g prefix C-a                        # Set prefix to <Ctrl-a>
set -g mouse on                          # Enable mouse support
set -g renumber-windows on               # Keep window numbers gapless
set -g display-time 2000                 # Message display duration (ms)
set -g history-limit 50000               # Large scrollback buffer
set -s set-clipboard on                  # System clipboard integration
set -g focus-events on                   # Pass focus events to apps (vim/nvim)
set -g repeat-time 1200                  # Duration for repeatable commands (-r)
set -g detach-on-destroy off             # Don't exit from tmux when closing a session

# ------------------------------------------------------------------------------
# TERMINAL / SSH COMPATIBILITY
# ------------------------------------------------------------------------------
# True color support
set -ga terminal-overrides ",xterm-256color:Tc"

# Image preview (yazi) and environment passthrough
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ------------------------------------------------------------------------------
# KEY BINDINGS
# ------------------------------------------------------------------------------
bind R source-file ~/.tmux.conf          # Reload config
bind C-a send-prefix                     # Double-tap Ctrl-a to send prefix to app

# --- Pane Navigation ---
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# --- Window Navigation & Creation ---
bind-key c new-window -c "#{pane_current_path}"
bind-key -r C-n next-window
bind-key -r C-p previous-window

# --- Resizing (Repeatable) ---
bind-key -r C-h resize-pane -L 2
bind-key -r C-l resize-pane -R 2
bind-key -r C-k resize-pane -U 2
bind-key -r C-j resize-pane -D 2

# --- Splits & Layout ---
bind-key H split-window -h -c "#{pane_current_path}"
bind-key V split-window -v -c "#{pane_current_path}"
bind-key r swap-pane -D                  # Rotate panes clockwise

# ------------------------------------------------------------------------------
# COPY MODE & BUFFER TOOLS
# ------------------------------------------------------------------------------
set-window-option -g mode-keys vi

# Vi-style selection/copy
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
set -s copy-command 'pbcopy'
bind-key -T copy-mode-vi y send -X copy-pipe 'pbcopy'

# Visual hook: Highlight pane in copy mode
set-hook -g pane-mode-changed { 
    if -F "#{pane_in_mode}" "selectp -P bg=#181818" "selectp -P default" 
}

# External Scripts
bind-key [ run-shell "~/dotfiles/.config/tmux/copy_mode_with_line_numbers.sh"
bind-key e run-shell "$XDG_CONFIG_HOME/tmux/vim-edit-tmux-output.sh"

# ------------------------------------------------------------------------------
# POPUPS
# ------------------------------------------------------------------------------
# y: Yazi (File Manager)
bind-key y display-popup -d '#{pane_current_path}' -h 85% -w 85% -E "tmux new-session -s yazi-popup 'yazi; tmux detach-client'"
# g: LazyDocker
bind-key g display-popup -d '#{pane_current_path}' -h 85% -w 85% -E 'lazydocker'
# k: sesh (session manager) + fzf-tmux (fzf-tmux is included in fzf)
bind-key "k" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 85%,85% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --preview-window 'right:50%' \
    --preview 'sesh preview {}'
)\""

# ------------------------------------------------------------------------------
# PLUGINS (TPM)
# ------------------------------------------------------------------------------
# Usage: prefix + I (Install), prefix + alt + u (Uninstall)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect' # prefix + Ctrl-s (Save), Ctrl-r (Restore)
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

# ------------------------------------------------------------------------------
# THEME: CATPPUCCIN
# ------------------------------------------------------------------------------
set -g @catppuccin_flavor 'mocha'
set -g status-position top
set -g status-right-length 100
set -g status-left-length 100

set -g status-left " "
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_flags_icon_zoom "#[fg=#{@thm_red}] •"
set -g @catppuccin_window_flags_icon_format "##{?window_activity_flag,#{E:@catppuccin_window_flags_icon_activity},}##{?window_bell_flag,#{E:@catppuccin_window_flags_icon_bell},}##{?window_silence_flag,#{E:@catppuccin_window_flags_icon_silent},}##{?window_marked_flag,#{E:@catppuccin_window_flags_icon_mark},}##{?window_zoomed_flag,#{E:@catppuccin_window_flags_icon_zoom},}"

# ------------------------------------------------------------------------------
# TPM INITIALIZATION
# ------------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
