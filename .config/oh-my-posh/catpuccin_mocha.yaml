$schema: https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 2
palette:
  grey: "#ACB0BE"
  white: "#F0F3F6"
  pink: "#F5C2E7"
  red: "#F26019"
  error_red: "#E03131"
  dir_red: "#FF9492"
  orange: "#FF9F3D"
  purple: "#B6C1FF"
  blue: "#89B4FA"
  lavender: "#CB9FFF"
  green: "#63FFA1"

blocks:
  - type: prompt
    alignment: left
    segments:
      - type: session
        style: plain
        foreground: p:purple
        template: "{{ if .SSHSession }}<p:lavender> </>{{ end }}{{ .UserName }}@<b>{{
          .HostName }}</b> "

      - type: path
        style: plain
        foreground: p:pink
        properties:
          style: agnoster_short
          home_icon: "~"
          folder_icon: "...."
        template: "{{ .Path }} "

      - type: executiontime
        style: plain
        foreground: p:grey
        properties:
          threshold: 200
          style: austin
        template: "{{ .FormattedMs }} "

      - type: status
        style: plain
        foreground: p:error_red
        template: "{{ if .Error }}{{ .Code }}{{ end }}"

  - type: prompt
    alignment: right
    segments:
      - type: git
        style: plain
        foreground: p:lavender
        properties:
          fetch_status: true
          branch_icon: " "
        template: "<b>{{ .HEAD }}</b>{{ if .Commit.Refs.Tags }} <p:lavender>{{
          .Commit.Refs.Tags }}</>{{ end }}{{ if or (.Working.Changed)
          (.Staging.Changed) }} <p:orange>✗</>{{ end }}"

  - type: prompt
    alignment: left
    segments:
      - type: text
        style: plain
        foreground: p:green
        template: "\n󱞩"

final_space: true
