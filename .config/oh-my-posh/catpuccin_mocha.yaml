# yaml-language-server: $schema: https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 2

palette:
  grey: "#ACB0BE"
  white: "#F0F3F6"
  pink: "#F5C2E7"
  red: "#F26019"
  error: "#E03131"
  orange: "#E08A5E"
  purple: "#B6C1FF"
  blue: "#89B4FA"
  lavender: "#CB9FFF"
  mint: "#6AC9A8"
  green: "#63FFA1"
  cyan: "#7ED6E8"

blocks:
  - type: prompt
    alignment: left
    segments:
      - type: session
        style: plain
        foreground: p:purple
        template: "{{ if .SSHSession }}<p:lavender> </>{{ end }}{{
          .UserName}}@<b>{{.HostName }}</b> "

      - type: path
        style: plain
        foreground: p:pink
        options:
          style: agnoster_short
          home_icon: "~"
          folder_icon: "...."
        template: "{{ .Path }} "

      - type: executiontime
        style: plain
        foreground: p:grey
        options:
          threshold: 200
          style: austin
        template: "{{ .FormattedMs }} "

      - type: status
        style: plain
        foreground: p:error
        template: "{{ if .Error }}({{ .Code }}){{ end }}"

  - type: prompt
    alignment: right
    segments:
      - type: git
        style: plain
        foreground: p:lavender
        options:
          fetch_status: true
          fetch_upstream_icon: true
          branch_icon: " "
          commit_icon: " "
          cherry_pick_icon: " "
          rebase_icon: " "
          merge_icon: " "
        template: "<b>{{ .HEAD }}</b>{{ if .Commit.Refs.Tags }} <p:blue>{{
          .Commit.Refs.Tags }}</>{{ end }}{{ if or (.Working.Changed) (
          .Staging.Changes )}}<p:orange><b> ✗</></b>{{ end }}{{ if gt .Ahead 0
          }} <p:green>↑{{ .Ahead }}</>{{ end }}{{ if gt .Behind 0 }} <p:red>↓{{
          .Behind }}</>{{ end }} "
      - type: text
        style: plain
        foreground: p:green
        template: "\n➜"

  - type: prompt
    alignment: left
    segments:
      - type: text
        style: plain
        template: ""

final_space: true
