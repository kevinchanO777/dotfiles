$schema: https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 2

palette:
  grey: "#ACB0BE"
  white: "#F0F3F6"
  pink: "#F5C2E7"
  red: "#F26019"
  error: "#E03131"
  orange: "#E08A5E"
  purple: "#B6C1FF"
  blue: "#89B4FA"
  lavender: "#CB9FFF"
  mint: "#6AC9A8"
  green: "#63FFA1"
  cyan: "#7ED6E8"

blocks:
  - type: prompt
    alignment: left
    segments:
      - type: session
        style: plain
        foreground: p:purple
        template: "{{ if .SSHSession }}<p:lavender> </>{{ end }}{{
          .UserName}}@<b>{{.HostName }}</b> "

      - type: path
        style: plain
        foreground: p:pink
        properties:
          style: agnoster_short
          home_icon: "~"
          folder_icon: "...."
        template: "{{ .Path }} "

      - type: executiontime
        style: plain
        foreground: p:grey
        properties:
          threshold: 200
          style: austin
        template: "{{ .FormattedMs }} "

      - type: status
        style: plain
        foreground: p:error
        template: "{{ if .Error }}({{ .Code }}){{ end }}"

  - type: prompt
    alignment: right
    segments:
      - type: git
        style: plain
        foreground: p:lavender
        properties:
          fetch_status: true
          fetch_upstream: true
          branch_icon: " "
          commit_icon: " "
          cherry_pick_icon: " "
          rebase_icon: " "
          merge_icon: " "
          tag_icon: " "
        template: "<b>{{ .HEAD }}</b>{{ if .Commit.Refs.Tags }} <p:blue>{{
          .Commit.Refs.Tags }}</>{{ end }}{{ if .Working.Changed }}
          <p:orange>●</>{{ end }}{{ if .Staging.Changed }} <p:mint>●</>{{ end
          }}{{ if gt .Ahead 0 }} <p:green>↑{{ .Ahead }}</>{{ end }}{{ if gt
          .Behind 0 }} <p:red>↓{{ .Behind }}</>{{ end }} "

  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: text
        style: plain
        foreground: p:green
        template: "➜"

final_space: true
