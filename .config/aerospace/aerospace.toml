config-version = 2

# ==============================================================================
# GENERAL & WORKSPACE SETTINGS
# ==============================================================================
start-at-login = true
persistent-workspaces = ["1", "2", "3", "4", "5"]
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 10

# Automatically unhide apps hidden via macOS Cmd+H
automatically-unhide-macos-hidden-apps = true

# Move mouse cursor when switching monitors
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Normalization settings
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Startup commands (e.g., JankyBorders)
after-startup-command = [
  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=4.0',
]

# ==============================================================================
# GAPS & PADDING
# ==============================================================================
[gaps]
inner.horizontal = 6
inner.vertical = 6
outer.top = 6
outer.bottom = 6
outer.left = 6
outer.right = 6

# ==============================================================================
# WINDOW RULES
# ==============================================================================

# Force ALL windows assigned to workspace 5 to automatically become floating
[[on-window-detected]]
if.during-aerospace-startup = false
run = []

# Wokrspace 5 as a floating ONLY workspace
[[on-window-detected]]
if.workspace = '5'
run = 'layout floating'

# ==============================================================================
# KEY MAPPINGS & MODES
# ==============================================================================
[key-mapping]
preset = 'qwerty'

# ------------------------------------------------------------------------------
# MAIN MODE
# ------------------------------------------------------------------------------
[mode.main.binding]

# Navigation / Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Moving Windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Layout Controls
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-period = 'layout floating tiling'
cmd-shift-z = 'fullscreen'                         # Tmux-style zoom toggle

# Resizing & Balancing
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'
alt-b = 'balance-sizes'

# Workspace Switching
ctrl-1 = 'workspace 1'
ctrl-2 = 'workspace 2'
ctrl-3 = 'workspace 3'
ctrl-4 = 'workspace 4'
ctrl-5 = 'workspace 5'

# Moving Windows to Workspaces
cmd-ctrl-1 = ['move-node-to-workspace 1', 'layout tiling']
cmd-ctrl-2 = ['move-node-to-workspace 2', 'layout tiling']
cmd-ctrl-3 = ['move-node-to-workspace 3', 'layout tiling']
cmd-ctrl-4 = ['move-node-to-workspace 4', 'layout tiling']
# Moving to 5 switches focus briefly to apply floating, or moves seamlessly
cmd-ctrl-5 = [
  'move-node-to-workspace 5',
  'workspace 5',
  'layout floating',
  'workspace-back-and-forth',
]

# Quick Navigation & Service Mode
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'
alt-shift-period = 'mode service'

# ------------------------------------------------------------------------------
# SERVICE MODE
# ------------------------------------------------------------------------------
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']                # Reset workspace layout
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
